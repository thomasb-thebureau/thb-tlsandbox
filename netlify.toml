[build]
  publish   = "."
  functions = "netlify/functions"

# Toutes les routes protégées sauf le callback Identity
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
